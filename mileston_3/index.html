<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Resume Builder</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Dynamic Resume Builder</h1>
    <form class="resume-form" id="resume-form"> <!-- Added ID here -->
      <fieldset>
        <legend>Personal information</legend>
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Enter your name" required />

        <label for="email">Email:</label> <!-- Changed for attribute from "name" to "email" -->
        <input type="email" id="email" placeholder="Enter your email" required/>

        <label for="phone">Phone Number:</label> <!-- Changed for attribute from "name" to "phone" -->
        <input type="tel" id="phone" placeholder="Enter your phone number" required/>
      </fieldset>

      <fieldset>
        <legend>Education</legend>
        <label for="education">Education</label>
        <textarea id="education" placeholder="Enter your education details" rows="4" required></textarea>
      </fieldset>

      <fieldset>
        <legend>Experience</legend>
        <label for="experience">Experience</label>
        <textarea id="experience" placeholder="Enter your work experience details" rows="6" required></textarea>
      </fieldset>

      <fieldset>
        <legend>Skills</legend>
        <label for="skills">Skills</label>
        <textarea id="skills" placeholder="Enter your skills" rows="6" required></textarea>
      </fieldset>

      <button type="submit"><b>Generate Resume</b></button>
    </form>

    <br>
    
    <!-- Dynamic Resume -->
    <div id="resume-display">
      <!-- Resume will be generated here -->
    </div>

    <script src="script.js"></script>
  </body>
</html>
